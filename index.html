:root{

  --c-penalty:#ef4444; --c-challenge:#8b5cf6; --c-mystery:#f97316;
  --c-island:#06b6d4; --c-rest:#64748b;
  --font-title:'Do Hyeon',sans-serif;
  --font-body:'Gowun Dodum',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg-gradient);min-height:100vh;display:flex;flex-direction:column;
  align-items:center;color:#1e293b;padding:24px;font-family:var(--font-body);}
header{text-align:center;color:#fff;margin-bottom:22px;text-shadow:0 3px 8px rgba(0,0,0,.4);}
header h1{font-family:var(--font-title);font-size:3rem;letter-spacing:1px;margin-bottom:8px;}
header p{font-size:1.25rem;opacity:.95;}

.game-container{display:flex;gap:28px;max-width:1500px;width:100%;justify-content:center;align-items:flex-start;}

.board-container{position:relative;width:1000px;height:680px;background:#1f8a5b;border-radius:26px;
  padding:18px;box-shadow:0 22px 50px rgba(0,0,0,.45);border:7px solid #0d6b45;
  display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(6,1fr);gap:9px;}

.center-card-area{grid-column:2/9;grid-row:2/6;background:var(--center-bg);border-radius:22px;
  box-shadow:inset 0 0 26px rgba(0,0,0,.08),0 8px 22px rgba(0,0,0,.2);padding:34px;
  display:flex;flex-direction:column;justify-content:space-between;align-items:center;text-align:center;
  border:5px dashed #ffb088;}

.tile{background:#fff;border-radius:13px;border:1px solid #cbd5e1;box-shadow:0 4px 7px rgba(0,0,0,.18);
  display:flex;flex-direction:column;justify-content:center;align-items:center;padding:5px;
  position:relative;transition:transform .15s;cursor:pointer;overflow:hidden;}
.tile:hover{transform:scale(1.06);z-index:5;}
.tile .tile-num{position:absolute;top:4px;left:7px;font-size:.95rem;color:#94a3b8;font-family:var(--font-title);}
.tile .tile-icon{font-size:1.9rem;line-height:1;margin:2px 0;}
.tile .tile-name{font-family:var(--font-title);font-size:1.05rem;text-align:center;width:100%;line-height:1.15;color:#1e293b;}

.tile.start{grid-column:1;grid-row:1;background:#10b981;color:#fff;}
.tile.goal {grid-column:1;grid-row:2;background:#f59e0b;color:#fff;box-shadow:0 0 18px #fbbf24;}
.tile.start .tile-name,.tile.goal .tile-name{color:#fff;font-size:1.3rem;}
.tile.start .tile-icon,.tile.goal .tile-icon{font-size:2.1rem;}

.tile.scientist{border-bottom:6px solid var(--c-scientist);}
.tile.invention{border-bottom:6px solid var(--c-invention);}
.tile.bonus{border-bottom:6px solid var(--c-bonus);}
.tile.penalty{border-bottom:6px solid var(--c-penalty);}
.tile.challenge{border-bottom:6px solid var(--c-challenge);}
.tile.mystery{border-bottom:6px solid var(--c-mystery);}
.tile.island{border-bottom:6px solid var(--c-island);}
.tile.rest{border-bottom:6px solid var(--c-rest);}

.piece-container{display:flex;gap:3px;position:absolute;bottom:4px;right:4px;flex-wrap:wrap;max-width:46px;justify-content:flex-end;}
.piece{width:15px;height:15px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.35);}
.piece.p1{background:#ef4444;}.piece.p2{background:#3b82f6;}.piece.p3{background:#10b981;}.piece.p4{background:#eab308;}

.active-tile{animation:pulse 1.4s infinite alternate;border:3px solid #ff477e !important;box-shadow:0 0 16px #ff477e !important;}
@keyframes pulse{0%{transform:scale(1);}100%{transform:scale(1.07);}}

.card-header{font-family:var(--font-title);font-size:1.3rem;color:#e8590c;letter-spacing:1px;}
.card-title{font-family:var(--font-title);font-size:1.9rem;color:#0f172a;margin-top:6px;}
.card-question{font-size:1.5rem;font-weight:bold;color:#334155;margin:18px 0;flex-grow:1;display:flex;align-items:center;justify-content:center;white-space:pre-line;line-height:1.5;}
.timer-badge{font-family:var(--font-title);background:#8b5cf6;color:#fff;padding:5px 16px;border-radius:14px;font-size:1.25rem;display:none;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.45;}}

.options-box{display:none;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
.opt-btn{font-family:var(--font-body);background:#fff;border:3px solid #cbd5e1;border-radius:14px;
  padding:18px 14px;font-size:1.4rem;font-weight:bold;cursor:pointer;transition:all .15s;color:#1e293b;}
.opt-btn:hover{border-color:#ff477e;background:#fff0f5;transform:translateY(-2px);}
.opt-btn:disabled{cursor:default;opacity:.95;}
.opt-btn.correct{background:#22c55e;border-color:#16a34a;color:#fff;}
.opt-btn.wrong{background:#ef4444;border-color:#dc2626;color:#fff;}
.opt-label{font-family:var(--font-title);color:#8b5cf6;margin-right:8px;}
.opt-btn.correct .opt-label,.opt-btn.wrong .opt-label{color:#fff;}

.control-panel{width:360px;background:rgba(255,255,255,.96);border-radius:22px;padding:22px;
  box-shadow:0 12px 28px rgba(0,0,0,.35);display:flex;flex-direction:column;gap:16px;}
.status-box{background:#f8fafc;border-radius:14px;padding:14px;border:1px solid #e2e8f0;}
.status-box h3{font-family:var(--font-title);font-size:1.25rem;margin-bottom:10px;color:#334155;border-bottom:1px solid #e2e8f0;padding-bottom:6px;}
.player-row{display:flex;justify-content:space-between;align-items:center;padding:7px;font-size:1.1rem;}
.player-row.active{background:#f0fdf4;outline:2px solid #22c55e;border-radius:8px;}
.player-row .pname{font-family:var(--font-title);}

.dice-section{text-align:center;padding:18px;background:#f1f5f9;border-radius:14px;border:1px solid #cbd5e1;}
.dice-btn{font-family:var(--font-title);background:#ef4444;color:#fff;border:none;padding:15px 20px;font-size:1.45rem;border-radius:12px;cursor:pointer;width:100%;box-shadow:0 4px 7px rgba(0,0,0,.18);transition:background .2s;}
.dice-btn:hover{background:#dc2626;}
.dice-btn:disabled{background:#cbd5e1;cursor:not-allowed;}
.dice-result{font-family:var(--font-title);font-size:3.4rem;margin-top:12px;color:#dc2626;height:58px;display:flex;align-items:center;justify-content:center;}

.log-box{height:120px;overflow-y:auto;background:#1e293b;color:#f1f5f9;border-radius:14px;padding:12px;font-size:1rem;line-height:1.5;}
.log-entry{margin-bottom:5px;border-bottom:1px solid #334155;padding-bottom:3px;}

@media(max-width:1300px){
  .game-container{flex-direction:column;align-items:center;}
  .board-container{width:100%;max-width:1000px;}
  .control-panel{width:100%;max-width:1000px;flex-direction:row;flex-wrap:wrap;}
  .control-panel>div{flex:1;min-width:240px;}
}
@media print{
  body{background:#fff;padding:0;}
  .control-panel{display:none;}
  .board-container{box-shadow:none;border:2px solid #000;background:#f8fafc;width:100%;height:auto;aspect-ratio:9/6;}
  .tile{border:1px solid #000 !important;box-shadow:none;}
  .center-card-area{border:2px dashed #000;background:#fff;}
}
</style>

const players = [
  {id:1,name:"1조 (빨강)",pos:0,score:0,color:"#ef4444",skip:false,class:"p1"},
  {id:2,name:"2조 (파랑)",pos:0,score:0,color:"#3b82f6",skip:false,class:"p2"},
  {id:3,name:"3조 (초록)",pos:0,score:0,color:"#10b981",skip:false,class:"p3"},
  {id:4,name:"4조 (노랑)",pos:0,score:0,color:"#eab308",skip:false,class:"p4"}
];
const GOAL_POS = 25;
let turn=0, activeQ=null, correctIdx=null, timerInterval=null, timeLeft=10, busy=false;
let lastQuestionIdx={};  // 칸별 직전 출제 문제 인덱스 (연속 중복 방지)

// 정답(원본 0번)을 포함해 보기 순서를 섞고, 정답의 새 위치를 함께 반환
function shuffleOptions(options){
  const arr=options.map((text,i)=>({text,wasCorrect:i===0}));
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return {
    options:arr.map(o=>o.text),
    correctIndex:arr.findIndex(o=>o.wasCorrect)
  };
}

function initBoard(){
  const boardEl=document.getElementById("board");
  tilesData.forEach(tile=>{
    const el=document.createElement("div");
    el.id="tile-"+tile.id;
    el.className="tile "+tile.type;
    el.style.gridColumn=tile.c;
    el.style.gridRow=tile.r;
    if(tile.id===0||tile.id===GOAL_POS){
      el.innerHTML=`<span class="tile-icon">${tile.icon}</span><span class="tile-name">${tile.name}</span><div class="piece-container" id="piece-box-${tile.id}"></div>`;
    }else{
      el.innerHTML=`<span class="tile-num">${tile.id}</span><span class="tile-icon">${tile.icon}</span><span class="tile-name">${tile.name}</span><div class="piece-container" id="piece-box-${tile.id}"></div>`;
    }
    boardEl.appendChild(el);
  });
  updateStatus(); renderPieces();
}

function updateStatus(){
  const list=document.getElementById("player-status-list"); list.innerHTML="";
  players.forEach((p,idx)=>{
    const row=document.createElement("div");
    row.className="player-row "+(idx===turn?"active":"");
    const where=p.pos===0?"출발":(p.pos===GOAL_POS?"👑 GOAL":p.pos+"번 칸");
    row.innerHTML=`<span class="pname" style="color:${p.color}">● ${p.name}</span><span>${where} (${p.score}점)</span>`;
    list.appendChild(row);
  });
}

function renderPieces(){
  tilesData.forEach(t=>{
    const box=document.getElementById("piece-box-"+t.id);
    if(box) box.innerHTML="";
    const tl=document.getElementById("tile-"+t.id);
    if(tl) tl.classList.remove("active-tile");
  });
  players.forEach(p=>{
    const box=document.getElementById("piece-box-"+p.pos);
    if(box){const d=document.createElement("span");d.className="piece "+p.class;box.appendChild(d);}
  });
  const cur=players[turn].pos;
  const ct=document.getElementById("tile-"+cur);
  if(ct) ct.classList.add("active-tile");
}

function log(msg){
  const box=document.getElementById("log-box");
  const e=document.createElement("div");e.className="log-entry";e.innerText=msg;
  box.appendChild(e);box.scrollTop=box.scrollHeight;
}

function rollDice(){
  if(busy) return;
  document.getElementById("dice-btn").disabled=true;
  const p=players[turn];
  if(p.skip){log(`☕ ${p.name}는 이번 턴 휴식합니다.`);p.skip=false;nextTurn();return;}
  busy=true;
  let count=0; const el=document.getElementById("dice-result");
  const iv=setInterval(()=>{
    el.innerText=Math.floor(Math.random()*6)+1; count++;
    if(count>8){
      clearInterval(iv);
      const n=Math.floor(Math.random()*6)+1;
      el.innerText=n; log(`🎲 ${p.name} 주사위: [ ${n} ]`);
      busy=false; movePlayer(n);
    }
  },80);
}

function movePlayer(steps){
  const p=players[turn];
  let target=p.pos+steps;
  if(target>=GOAL_POS){p.pos=GOAL_POS;renderPieces();updateStatus();endGame(p);return;}
  p.pos=target; renderPieces(); updateStatus();
  processTile(tilesData[target]);
}

// 정답/오답 결과로 한 칸만 조용히 이동 (도착 칸에서 새 문제 풀지 않고 턴 종료)
function shiftOnly(steps){
  const p=players[turn];
  let target=p.pos+steps;
  if(target>=GOAL_POS){p.pos=GOAL_POS;renderPieces();updateStatus();endGame(p);return;}
  if(target<0) target=0;
  p.pos=target; renderPieces(); updateStatus();
  setTimeout(nextTurn,1200);
}

function processTile(tile){
  const cardType=document.getElementById("card-type");
  const cardTitle=document.getElementById("card-title");
  const cardMsg=document.getElementById("card-msg");
  const optBox=document.getElementById("options-box");
  const timerEl=document.getElementById("timer");
  optBox.style.display="none"; optBox.innerHTML="";
  timerEl.style.display="none"; clearInterval(timerInterval);

  const typeLabel={scientist:"과학자",invention:"발명품",challenge:"챌린지",mystery:"미스터리",island:"무인도",bonus:"보너스",penalty:"페널티",rest:"휴식"};
  cardType.innerText=typeLabel[tile.type]||tile.type;
  cardTitle.innerText=`${tile.id}번 · ${tile.name}`;

  if(["scientist","invention","challenge","mystery","island"].includes(tile.type)){
    const qList=questionPool[tile.id];
    if(qList && qList.length){
      // 풀에서 랜덤 문제 선택 (직전과 다른 문제 우선)
      let qIdx=Math.floor(Math.random()*qList.length);
      if(qList.length>1 && lastQuestionIdx[tile.id]===qIdx){
        qIdx=(qIdx+1)%qList.length;
      }
      lastQuestionIdx[tile.id]=qIdx;
      const picked=qList[qIdx];
      // 정답은 원본 0번. 보기 셔플 후 정답의 새 위치를 correctIdx로
      const shuffled=shuffleOptions(picked.options);
      activeQ=tile; correctIdx=shuffled.correctIndex;
      cardMsg.innerText=picked.q;
      optBox.style.display="grid";
      const labels=["A","B","C","D"];
      shuffled.options.forEach((opt,i)=>{
        const b=document.createElement("button");
        b.className="opt-btn";
        b.innerHTML=`<span class="opt-label">${labels[i]}</span>${opt}`;
        b.onclick=()=>chooseAnswer(i,b);
        optBox.appendChild(b);
      });
      if(tile.type==="challenge"){
        timerEl.style.display="inline-block"; timeLeft=10; timerEl.innerText=`⏳ ${timeLeft}초`;
        timerInterval=setInterval(()=>{
          timeLeft--; timerEl.innerText=`⏳ ${timeLeft}초`;
          if(timeLeft<=0){clearInterval(timerInterval);log("⏰ 시간 초과!");revealAndFail();}
        },1000);
      }
    }else{
      cardMsg.innerText="빈 칸입니다. 다음 차례로 넘어갑니다.";
      setTimeout(nextTurn,1400);
    }
  }else if(tile.type==="bonus"){
    cardMsg.innerText="🎁 보너스! 앞으로 1칸 전진합니다.";
    setTimeout(()=>shiftOnly(1),1400);
  }else if(tile.type==="penalty"){
    cardMsg.innerText="⚠️ 페널티! 뒤로 1칸 후퇴합니다.";
    setTimeout(()=>shiftOnly(-1),1400);
  }else if(tile.type==="rest"){
    cardMsg.innerText="☕ 휴식 칸. 다음 턴을 쉽니다.";
    players[turn].skip=true; setTimeout(nextTurn,1600);
  }
}

function chooseAnswer(idx,btn){
  clearInterval(timerInterval);
  const optBox=document.getElementById("options-box");
  [...optBox.children].forEach(b=>b.disabled=true);
  const p=players[turn]; const tile=activeQ;
  if(idx===correctIdx){
    btn.classList.add("correct");
    p.score+=10; updateStatus();
    log(`⭕ 정답! ${p.name} (+10점) → 앞으로 1칸`);
    setTimeout(()=>shiftOnly(1),1300);
  }else{
    btn.classList.add("wrong");
    optBox.children[correctIdx].classList.add("correct");
    log(`❌ 오답! ${p.name} → 뒤로 1칸`);
    setTimeout(()=>shiftOnly(-1),1300);
  }
}

function revealAndFail(){
  const optBox=document.getElementById("options-box");
  [...optBox.children].forEach(b=>b.disabled=true);
  if(optBox.children[correctIdx]) optBox.children[correctIdx].classList.add("correct");
  log(`⏰ 시간 초과! ${players[turn].name} → 뒤로 1칸`);
  setTimeout(()=>shiftOnly(-1),1300);
}

function nextTurn(){
  turn=(turn+1)%players.length;
  updateStatus(); renderPieces();
  document.getElementById("card-type").innerText="SYSTEM";
  document.getElementById("card-title").innerText=`${players[turn].name} 차례`;
  document.getElementById("card-msg").innerText="🎲 주사위를 굴려 이동하세요.";
  document.getElementById("options-box").style.display="none";
  document.getElementById("timer").style.display="none";
  document.getElementById("dice-btn").disabled=false;
}

function endGame(winner){
  document.getElementById("card-type").innerText="🏆 GAME OVER";
  document.getElementById("card-title").innerText="우승!";
  document.getElementById("card-msg").innerHTML=`🎉 <strong>${winner.name}</strong>가 먼저 GOAL에 도착했습니다!`;
  document.getElementById("options-box").style.display="none";
  document.getElementById("dice-btn").disabled=true;
  log(`🏁 게임 종료: ${winner.name} 우승!`);
}

window.onload=initBoard;
